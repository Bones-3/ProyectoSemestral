server:
  port: 8086

spring:
  application:
    name: ms-pago

  datasource:
    url: jdbc:mysql://localhost:3306/db_pago
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: none

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true